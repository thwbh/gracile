name: CD

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        type: choice
        options: [patch, minor, major]

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack,cargo-workspaces

      # cargo ws version bumps [workspace.package] version, updates Cargo.lock,
      # and creates the git commit + tag. --no-git-commit lets us include the
      # changelog in the same commit instead of making a separate one.

      - name: Bump workspace version
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          cargo ws version ${{ github.event.inputs.bump }} --yes --no-git-commit
          echo "new=$(grep '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"
        id: version

      - name: Run tests
        run: cargo test --all-features

      # Renders CHANGELOG.md using the project's own CLI binary, which was
      # compiled as a side-effect of the test step above.

      - name: Generate changelog
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          cargo build -p gracile-cli
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          RANGE="${PREV_TAG:+${PREV_TAG}..HEAD}"
          RANGE="${RANGE:-HEAD}"
          PREV_CONTENT=$(awk '/^## \[[0-9]/{found=1} found{print}' CHANGELOG.md 2>/dev/null || true)

          git log $RANGE --format="%h%x1f%cs%x1f%s%x1f%b%x1e" \
            | jq -Rsr -f gracile/changelog.jq \
                --arg version "$NEW_VERSION" \
                --arg date "$(date -u +%Y-%m-%d)" \
                --arg prev "$PREV_CONTENT" \
            | ./target/debug/gracile render gracile/CHANGELOG.md.gracile \
                --data /dev/stdin \
                --output CHANGELOG.md

      # wasm-pack reads the version from Cargo.toml, so pkg/package.json already
      # contains the new version. Only the package name needs patching.

      - name: Build WASM
        run: wasm-pack build gracile-wasm --target bundler --release

      - name: Patch WASM package name
        run: |
          jq '.name = "@gracile-rs/wasm"' \
            gracile-wasm/pkg/package.json > gracile-wasm/pkg/package.json.tmp
          mv gracile-wasm/pkg/package.json.tmp gracile-wasm/pkg/package.json
 
      - name: Commit and tag release
        run: |
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git tag -a "v${{ steps.version.outputs.new }}" -m "Release v${{ steps.version.outputs.new }}"
          git push origin main --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          NOTES=$(awk '/^## \[[0-9]/{found++} found==1{print} found==2{exit}' CHANGELOG.md)
          gh release create "v$NEW_VERSION" --title "v$NEW_VERSION" --notes "$NOTES"

      # cargo ws publish resolves dependency order automatically and polls
      # crates.io for each crate to be indexed before publishing the next one.

      - name: Publish to crates.io
        run: cargo ws publish --publish-as-is --yes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: gracile-wasm/pkg
