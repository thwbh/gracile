name: CD

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        type: choice
        options: [patch, minor, major]

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack,cargo-workspaces

      # ── Bump version ──────────────────────────────────────────────────────
      # cargo ws version bumps [workspace.package] version, updates Cargo.lock,
      # and creates the git commit + tag. --no-git-commit lets us include the
      # WASM build in the same commit instead of making a separate one.

      - name: Bump workspace version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cargo ws version ${{ github.event.inputs.bump }} --yes --no-git-commit
          echo "new=$(grep '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"
        id: version

      # ── Validate ──────────────────────────────────────────────────────────

      - name: Run tests
        run: cargo test --all-features

      # ── Build WASM ────────────────────────────────────────────────────────
      # wasm-pack reads the version from Cargo.toml, so pkg/package.json already
      # contains the new version. Only the package name needs patching.

      - name: Build WASM
        run: wasm-pack build gracile-wasm --target bundler --release

      - name: Patch WASM package name
        run: |
          jq '.name = "@gracile-rs/wasm"' \
            gracile-wasm/pkg/package.json > gracile-wasm/pkg/package.json.tmp
          mv gracile-wasm/pkg/package.json.tmp gracile-wasm/pkg/package.json

      # ── Commit, tag, push ─────────────────────────────────────────────────

      - name: Commit and tag release
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --follow-tags

      # ── Publish to crates.io ──────────────────────────────────────────────
      # cargo ws publish resolves dependency order automatically and polls
      # crates.io for each crate to be indexed before publishing the next one.

      - name: Publish to crates.io
        run: cargo ws publish --yes --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # ── Publish to npm ────────────────────────────────────────────────────

      - name: Publish to npm
        run: npm publish --access public
        working-directory: gracile-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
